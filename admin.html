<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" href="assets/img/smiley-black.png" />
  <title>AWAKEN Content Admin</title>
  <link rel="stylesheet" href="admin/admin.css" />
</head>
<body>
  <header class="admin-header">
    <div><strong>AWAKEN Content Admin</strong><small id="admin-mode">Local editorial preview</small></div>
    <form id="admin-auth" class="admin-auth">
      <input name="email" type="email" autocomplete="username" placeholder="Admin email" aria-label="Admin email" />
      <input name="password" type="password" autocomplete="current-password" placeholder="Password" aria-label="Admin password" />
      <button type="submit">Sign in</button>
    </form>
    <a href="./index.html">View desktop</a>
  </header>
  <main class="admin-shell">
    <nav class="admin-tabs" aria-label="Content sections">
      <button type="button" data-section="transmissions" aria-pressed="true">Transmissions</button>
      <button type="button" data-section="links">Links</button>
      <button type="button" data-section="themes">Themes</button>
      <button type="button" data-section="fragments">Fragments</button>
      <button type="button" data-section="filesystem">Filesystem</button>
      <button type="button" data-section="media">Media</button>
      <button type="button" data-section="campaigns">Campaigns</button>
      <button type="button" data-section="ads">Ads &amp; Intrusion</button>
      <button type="button" data-section="featureFlags">Feature Flags</button>
      <button type="button" data-section="gallerySubmissions">Gallery Submissions</button>
      <button type="button" data-section="mindBridge">MIND / XP Bridge</button>
      <button type="button" data-section="contributors">Team &amp; Contributors</button>
      <button type="button" data-section="atlasEntities">Atlas Entities</button>
      <button type="button" data-section="atlasRelationships">Atlas Relationships</button>
      <button type="button" data-section="atlasSources">Atlas Sources</button>
      <button type="button" data-section="icons">Desktop Icons</button>
    </nav>
    <section class="admin-list-panel">
      <div class="panel-head"><h1 id="section-title">Transmissions</h1><button id="new-entry" type="button">New</button></div>
      <div id="entry-list"></div>
    </section>
    <section class="admin-editor" aria-label="Content editor">
      <form id="editor-form">
        <div class="editor-empty">Select an entry or create a new one.</div>
      </form>
    </section>
  </main>
  <div id="admin-status" class="admin-status" role="status" hidden></div>
  <script src="config.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.57.4/dist/umd/supabase.min.js"></script>
  <script type="module" src="admin/admin.js"></script>
</body>
</html>

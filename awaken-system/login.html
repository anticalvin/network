<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AWAKEN Guest Login</title><link rel="stylesheet" href="system.css"><script src="managed-entry.js?v=runtime-11"></script></head><body class="login"><main class="login-main"><section class="login-shell"><div class="brand"><img src="../assets/img/awaken-logo.webp" alt="AWAKEN"><div><h1 data-managed-text="loginProductName">AWAKEN NETWORK</h1><p data-managed-text="loginIntro">Select a session to enter the system.</p></div></div><article class="card"><div class="avatar"><img data-managed-src="profileImageUrl" src="../assets/img/smiley-black.png" alt="Guest icon"></div><div><h2 data-managed-text="profileName">AWAKEN Guest</h2><p data-managed-text="profileDescription">Local archive access. Memory Card begins in visitor mode.</p><button id="enter" class="btn btn-red">Enter Network</button> <button id="recover" class="btn">Recovery Options</button></div></article></section></main><footer class="login-foot"><span>CALL-AWAKEN network status: connected</span><span>unauthorised memories will be stored locally</span></footer><script>
const params=new URLSearchParams(location.search),embedded=params.has('embedded')&&self!==top;if(!embedded){location.replace('../');}function enter(){if(!embedded)return;document.querySelector('#enter').textContent='Loading session...';setTimeout(()=>parent.postMessage({type:'awaken:entry',stage:'complete'},location.origin),350)}document.querySelector('#enter').onclick=enter;document.querySelector('#recover').onclick=()=>alert('AWAKEN RECOVERY\n\nArchive: available\nMemory Card: guest mode\nNetwork: connected\n\nNo repair is required.');addEventListener('keydown',e=>{if(e.key==='Enter')enter()});
</script></body></html>

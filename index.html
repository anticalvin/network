<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AWAKEN NETWORK OS - the connected archive shell for AWAKEN CULT." />
  <title>AWAKEN NETWORK OS</title>
  <script>
    (() => {
      const params = new URLSearchParams(location.search);
      const bypass = params.has("skipBoot") || sessionStorage.getItem("awaken.session") === "guest";
      if (!bypass && sessionStorage.getItem("awaken.entrySequenceComplete") !== "true") {
        location.replace("./awaken-system/bios.html");
      }
    })();
  </script>
  <link rel="icon" href="assets/img/smiley-black.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="bootloader" class="bootloader" aria-live="polite">
    <div class="boot-panel">
      <img src="assets/img/awaken-logo.webp" alt="AWAKEN CULT" class="boot-logo" />
      <pre id="boot-text"></pre>
      <button id="boot-skip" class="boot-skip" type="button">Skip Boot</button>
    </div>
  </div>

  <main id="os-container" class="os" aria-label="AWAKEN NETWORK desktop">
    <header id="topbar" class="topbar">
      <span id="path-label">A:\</span>
      <strong>AWAKEN NETWORK</strong>
      <span class="signal">SIGNAL STABLE</span>
      <time id="top-clock"></time>
    </header>

    <section id="work-area" class="work-area">
      <div id="desktop-icons" class="desktop-icons"></div>
    </section>

    <nav id="start-menu" class="start-menu" aria-label="Start menu" tabindex="-1" hidden>
      <div class="start-head">
        <img src="assets/img/smiley-black.png" alt="" />
        <div>
          <strong>AWAKEN OS</strong>
          <span>user: visitor</span>
        </div>
      </div>
      <input id="start-search" class="start-search" type="search" placeholder="Search apps, files, projects..." />
      <div id="start-list" class="start-list"></div>
      <div class="start-actions">
        <button type="button" data-action="run">Run...</button>
        <button type="button" data-action="reboot">Reboot</button>
      </div>
    </nav>

    <footer id="taskbar" class="taskbar">
      <button id="start-button" class="start-button" type="button">
        <span class="start-dot"></span>
        Start
      </button>
      <div id="task-buttons" class="task-buttons" aria-label="Open windows"></div>
      <div class="system-tray">
        <span>NET</span>
        <time id="task-clock"></time>
      </div>
    </footer>
    <div id="transmission-layer" class="transmission-layer" aria-live="polite"></div>
  </main>

  <audio id="audio-snippet" src="assets/audio/snippet.wav" preload="auto"></audio>
  <script src="config.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>

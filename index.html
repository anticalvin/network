  <script>
    (() => {
      const params = new URLSearchParams(location.search);
      const authType = params.get("type") || new URLSearchParams(location.hash.slice(1)).get("type");
      const hasAuthCode = params.has("code");
      if (["invite", "recovery"].includes(authType) || hasAuthCode) {
        location.replace(`./admin.html${location.search}${location.hash}`);
        return;
      }
      const bypass = params.has("skipBoot") || sessionStorage.getItem("awaken.session") === "guest";
      window.AWAKEN_ENTRY_REQUIRED = !bypass && sessionStorage.getItem("awaken.entrySequenceComplete") !== "true";
      document.documentElement.classList.toggle("entry-required", window.AWAKEN_ENTRY_REQUIRED);
    })();
  </script>

<body>
  <iframe id="entry-sequence" class="entry-sequence" title="AWAKEN entry sequence" hidden></iframe>
  <div id="bootloader" class="bootloader" aria-live="polite">
    <div class="boot-panel">
      <img src="assets/img/awaken-logo.webp" alt="AWAKEN CULT" class="boot-logo" />
      <pre id="boot-text"></pre>
      <button id="boot-skip" class="boot-skip" type="button">Skip Boot</button>
    </div>
  </div>

  <main id="os-container" class="os" aria-label="AWAKEN NETWORK desktop">
    <header id="topbar" class="topbar">
      <span id="path-label">A:\</span>
      <h1>AWAKEN NETWORK</h1>
      <span class="signal">NETWORK ONLINE</span>
      <time id="top-clock"></time>
    </header>

    <section id="work-area" class="work-area">
      <div id="desktop-icons" class="desktop-icons"></div>
    </section>

    <nav id="start-menu" class="start-menu" aria-label="Start menu" tabindex="-1" hidden>
      <div class="start-head">
        <img src="assets/img/smiley-black.png" alt="" />
        <div>
          <strong>AWAKEN OS</strong>
          <span>user: visitor</span>
        </div>
      </div>
      <input id="start-search" class="start-search" type="search" placeholder="Search apps, files, projects..." />
      <div id="start-list" class="start-list"></div>
      <div class="start-actions">
        <button type="button" data-action="run">Run...</button>
        <button type="button" data-action="reboot">Reboot</button>
      </div>
    </nav>

    <footer id="taskbar" class="taskbar">
      <button id="start-button" class="start-button" type="button" aria-haspopup="menu" aria-expanded="false">
        <span class="start-dot"><img src="https://i.ibb.co/gFPrR060/awaken-eye-black.webp" alt="" /></span>
        Start
      </button>
      <div id="task-buttons" class="task-buttons" aria-label="Open windows"></div>
      <div class="system-tray">
        <span>NET</span>
        <time id="task-clock"></time>
      </div>
    </footer>
    <div id="transmission-layer" class="transmission-layer" aria-live="polite"></div>
  </main>

  <audio id="audio-snippet" src="assets/audio/snippet.wav" preload="auto"></audio>
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.57.4/dist/umd/supabase.min.js"></script>
  <script src="config.js?v=runtime-4"></script>
  <script>
    (() => {
      if (!window.AWAKEN_ENTRY_REQUIRED) return;
      const frame = document.getElementById("entry-sequence");
      const stages = new Set(["bios", "startup", "login"]);
      frame.hidden = false;
      frame.src = "./awaken-system/bios.html?embedded=1";
      addEventListener("message", (event) => {
        if (event.origin !== location.origin || event.source !== frame.contentWindow || event.data?.type !== "awaken:entry") return;
        if (stages.has(event.data.stage)) {
          frame.src = `./awaken-system/${event.data.stage}.html?embedded=1`;
          return;
        }
        if (event.data.stage === "complete") {
          sessionStorage.setItem("awaken.session", "guest");
          sessionStorage.setItem("awaken.entrySequenceComplete", "true");
          sessionStorage.setItem("awaken.loginAt", new Date().toISOString());
          frame.remove();
          document.documentElement.classList.remove("entry-required");
          document.dispatchEvent(new CustomEvent("awaken:entry-complete"));
        }
      });
    })();
  </script>
  <script type="module" src="script.js?v=runtime-5"></script>
</body>
</html>

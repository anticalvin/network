<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AWAKEN NETWORK</title>
<meta name="description" content="AWAKEN NETWORK — an alternate operating system for AWAKEN CULT.">
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Bootloader -->
  <div id="bootloader">
    <div class="boot-wrap">
      <div class="boot-logo flicker">AWAKEN<span>.NET</span></div>
      <pre id="boot-text"></pre>
      <div class="boot-bar-track"><div class="boot-bar-fill" id="boot-bar-fill"></div></div>
      <div class="boot-hint" id="boot-hint" style="display:none;">press ENTER or click to continue&hellip;</div>
    </div>
  </div>

  <!-- Desktop environment -->
  <div id="desktop" class="desktop" style="display:none;">

    <div id="topbar">
      <div class="tb-left">
        <div class="wordmark-mini" id="logo-click-target">AWAKEN<span>.NET</span></div>
        <div class="signal flicker">
          <span class="bars"><i></i><i></i><i></i><i></i></span>
          <span>SIGNAL</span>
        </div>
      </div>
      <div class="tb-right">
        <span id="clock">00:00:00</span>
        <button class="icon-btn" id="sound-toggle" title="toggle sound">&#9834;</button>
        <button id="discord-pill" title="Join the AWAKEN CULT Discord">ENTER ROOM</button>
      </div>
    </div>

    <div id="icons" class="icon-container"></div>

    <div id="toast-stack"></div>

    <div id="taskbar">
      <button class="tb-start" id="tb-start">AWAKEN</button>
      <div class="tb-apps" id="tb-apps"></div>
    </div>
  </div>

  <!-- Windows -->
  <div id="windows-container"></div>

  <!-- TV channel easter egg overlay -->
  <div id="tv-overlay">
    <div class="tv-static" id="tv-static"></div>
    <div class="tv-frame" id="tv-frame"></div>
  </div>

  <!-- Global CRT / noise overlays -->
  <div id="crt-layer"></div>
  <div id="noise-layer"></div>

  <script src="script.js"></script>
</body>
</html>

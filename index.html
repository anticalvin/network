<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWAKEN NETWORK</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Load Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-+uH1rKjSVV1YxAECEV4VpWw2X2gYdEx+kt1lEuzMdGII4XESyqSeX5TR1+t0NenE2x0RvrRZtGJPD7WvPup7nw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <!-- Bootloader screen -->
  <div id="bootloader">
    <!-- AWAKEN logo displayed during boot for extra nostalgia -->
    <div id="boot-logo-container">
      <img id="boot-logo" src="assets/img/awaken-logo.webp" alt="AWAKEN logo" />
      <img id="boot-smiley" src="assets/img/smiley-black.png" alt="Awaken mascot smiley" />
    </div>
    <pre id="boot-text"></pre>
  </div>

  <!-- Desktop environment -->
  <div id="desktop" class="desktop" style="display:none;">
    <!-- Icons will be injected here -->
    <div id="icons" class="icon-container"></div>
    <!-- Taskbar at the bottom -->
    <div id="taskbar">
      <div id="taskbar-left">
        <button id="start-button">Start</button>
      </div>
      <div id="taskbar-windows"></div>
      <div id="taskbar-right">
        <span id="clock"></span>
      </div>
    </div>
  </div>

  <!-- Container for dynamic windows -->
  <div id="windows-container"></div>

  <!-- Audio sources -->
  <audio id="audio-snippet" src="assets/audio/snippet.wav" preload="auto"></audio>

  <!-- Additional audio elements can be appended dynamically -->

  <script src="script.js"></script>
</body>
</html>
